<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  html, body { margin: 0; background: #050506; }
  .qp, .qp *, .qp *::before, .qp *::after { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  .qp {
    --bg-top:#17171b; --bg-bot:#0f0f12; --fg:#f5f5f7; --body:#c9c9cd; --muted:#8a8a90; --faint:#66676c;
    --line:rgba(255,255,255,0.08); --track:rgba(255,255,255,0.06);
    --state-ok:oklch(0.76 0.05 162); --state-warn:#ffc533; --state-crit:#ff5d5d; --green:#59d499;
    --state:var(--state-ok);
    --border-warn:rgba(255,197,51,0.55); --border-crit:rgba(255,93,93,0.7);
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));
    border:1px solid var(--line); border-radius:999px; overflow:hidden;
    font-family:"Segoe UI Variable Display","Segoe UI",-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; color:var(--fg);
    box-shadow:0 18px 40px rgba(0,0,0,.5);
  }
  .qp.sev-warning{ --state:var(--state-warn); box-shadow:inset 0 0 0 1.5px var(--border-warn), 0 18px 40px rgba(0,0,0,.5); }
  .qp.sev-critical{ --state:var(--state-crit); box-shadow:inset 0 0 0 1.5px var(--border-crit), 0 18px 40px rgba(0,0,0,.5); }
  .qp .pill{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-variant-numeric:tabular-nums; }
  .qp .pill-pct{ font-weight:650; color:var(--fg); line-height:1; white-space:nowrap; }
  .qp .pill-dot, .qp .pill-gauge, .qp .pill-bar{ display:none; }
  .qp .pill--bar{ gap:7px; padding:0 11px; }
  .qp .pill--bar .pill-pct{ font-size:11px; flex:none; }
  .qp .pill--bar .pill-bar{ display:block; flex:1; min-width:0; height:4px; background:var(--track); border-radius:999px; overflow:hidden; }
  .qp .pill-bar-fill{ display:block; height:100%; border-radius:999px; background:var(--state); box-shadow:inset 0 1px 0 rgba(255,255,255,.28); }
  .qp .pill--ring{ gap:7px; padding:0 10px; }
  .qp .pill--ring .pill-pct{ font-size:10.5px; font-weight:600; color:var(--body); flex:none; }
  .qp .pill--ring .pill-gauge{ display:block; }
  .qp .pill-gauge{ width:20px; height:20px; flex:none; transform:rotate(-90deg); }
  .qp .pg-track{ fill:none; stroke:rgba(255,255,255,.16); stroke-width:5; }
  .qp .pg-arc{ fill:none; stroke:var(--state); stroke-width:5; stroke-linecap:round; filter:drop-shadow(0 0 1.5px color-mix(in srgb,var(--state) 45%,transparent)); }
  .qp .pill--minimal{ gap:6px; padding:0 11px; }
  .qp .pill--minimal .pill-pct{ font-size:11.5px; }
  .qp .pill--minimal .pill-dot{ display:block; }
  .qp .pill-dot{ width:6px; height:6px; flex:none; border-radius:50%; background:var(--state); box-shadow:0 0 0 2.5px color-mix(in srgb,var(--state) 18%,transparent); }
</style>
</helmet>
<div style="position:relative; width:1320px; height:470px; overflow:hidden;
      background:radial-gradient(120% 100% at 50% -10%, #15171d 0%, #0b0c0f 55%, #050506 100%);
      font-family:'Segoe UI',-apple-system,system-ui,sans-serif; color:#f5f5f7;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;">

  <div style="text-align:center; margin-bottom:14px;">
    <div style="font-size:13px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#7c7e86; white-space:nowrap;">Pill mode</div>
    <div style="margin-top:9px; font-size:19px; font-weight:550; letter-spacing:-.01em; color:#e8e8ec; white-space:nowrap;">Three compact styles · expands on hover</div>
  </div>

  <div style="display:flex; align-items:flex-start; gap:64px;">

    <!-- BAR -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
      <div style="transform:scale(2.4); transform-origin:center;">
        <div class="qp" style="width:96px; height:34px;">
          <div class="pill pill--bar">
            <span class="pill-pct">62%</span>
            <span class="pill-bar"><span class="pill-bar-fill" style="width:62%"></span></span>
          </div>
        </div>
      </div>
      <div style="margin-top:18px; text-align:center;">
        <div style="font-size:13px; font-weight:600; color:#e8e8ec; letter-spacing:.02em;">bar</div>
        <div style="margin-top:5px; font-size:11.5px; color:#6f7178;">number + track</div>
      </div>
    </div>

    <!-- RING -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
      <div style="transform:scale(2.4); transform-origin:center;">
        <div class="qp" style="width:86px; height:34px;">
          <div class="pill pill--ring">
            <svg class="pill-gauge" viewBox="0 0 36 36"><circle class="pg-track" cx="18" cy="18" r="15"></circle><circle class="pg-arc" cx="18" cy="18" r="15" style="stroke-dasharray:58.43 94.25"></circle></svg>
            <span class="pill-pct">62%</span>
          </div>
        </div>
      </div>
      <div style="margin-top:18px; text-align:center;">
        <div style="font-size:13px; font-weight:600; color:#e8e8ec; letter-spacing:.02em;">ring</div>
        <div style="margin-top:5px; font-size:11.5px; color:#6f7178;">radial gauge</div>
      </div>
    </div>

    <!-- MINIMAL -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
      <div style="transform:scale(2.4); transform-origin:center;">
        <div class="qp" style="width:78px; height:34px;">
          <div class="pill pill--minimal">
            <span class="pill-dot"></span>
            <span class="pill-pct">62%</span>
          </div>
        </div>
      </div>
      <div style="margin-top:18px; text-align:center;">
        <div style="font-size:13px; font-weight:600; color:#e8e8ec; letter-spacing:.02em;">minimal</div>
        <div style="margin-top:5px; font-size:11.5px; color:#6f7178;">dot + number</div>
      </div>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
