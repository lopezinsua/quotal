<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<body>
<x-dc>
<helmet>
<style>
  html, body { margin: 0; background: #050506; }
  .qw, .qw *, .qw *::before, .qw *::after { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  .qw {
    --bg-top:#17171b; --bg-bot:#0f0f12; --fg:#f5f5f7; --body:#c9c9cd; --muted:#8a8a90; --faint:#66676c;
    --line:rgba(255,255,255,0.08); --track:rgba(255,255,255,0.06);
    --state-ok:oklch(0.76 0.05 162); --state-warn:#ffc533; --state-crit:#ff5d5d;
    --weekly-ok:oklch(0.66 0.05 264); --green:#59d499;
    --accent:var(--green); --state:var(--state-ok);
    --border-warn:rgba(255,197,51,0.55); --border-crit:rgba(255,93,93,0.7);
    position:relative; width:248px; background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));
    border-radius:14px; border:1px solid var(--line); display:flex; flex-direction:column; overflow:hidden;
    font-family:"Segoe UI Variable Display","Segoe UI",-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; color:var(--fg);
  }
  .qw.sev-warning{ --state:var(--state-warn); box-shadow:inset 0 0 0 1.5px var(--border-warn); }
  .qw.sev-critical{ --state:var(--state-crit); box-shadow:inset 0 0 0 1.5px var(--border-crit); }
  .qw .bar{ display:flex; align-items:center; justify-content:space-between; padding:9px 9px 7px 13px; }
  .qw .title{ font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.13em; color:var(--muted); }
  .qw .actions{ display:flex; gap:1px; }
  .qw .icon-btn{ display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; background:transparent; border:none; color:var(--muted); border-radius:6px; }
  .qw .body{ flex:1; display:flex; flex-direction:column; gap:9px; padding:3px 13px 11px; }
  .qw .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); flex:none; box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent); }
  .qw .plan-head{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  .qw .plan-name{ font-size:14px; font-weight:650; letter-spacing:-.01em; color:var(--fg); }
  .qw .plan-sub{ font-size:8.5px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); }
  .qw .usage-block{ display:flex; flex-direction:column; }
  .qw .usage-block.hero{ position:relative; padding:8px 11px 10px; border-radius:10px; background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.018)); border:1px solid var(--line); box-shadow:inset 0 1px 0 rgba(255,255,255,.06); overflow:hidden; }
  .qw .usage-row{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; position:relative; z-index:1; }
  .qw .usage-name{ font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .qw .hero .usage-reset{ font-size:9px; color:var(--faint); font-variant-numeric:tabular-nums; white-space:nowrap; flex:none; }
  .qw .hero .usage-name{ overflow:visible; flex:none; }
  .qw .context-pct{ flex:none; white-space:nowrap; }
  .qw .hero .usage-pct{ position:relative; z-index:1; display:block; margin:2px 0 9px; font-size:24px; font-weight:600; line-height:1; letter-spacing:-.02em; color:var(--fg); font-variant-numeric:tabular-nums; }
  .qw .sparkline{ position:absolute; left:0; right:0; top:22px; width:100%; height:40px; z-index:0; color:var(--state); opacity:.34; pointer-events:none; }
  .qw .progress-track{ position:relative; width:100%; height:5px; background:var(--track); border-radius:999px; overflow:hidden; box-shadow:inset 0 1px 1.5px rgba(0,0,0,.3); z-index:1; }
  .qw .progress-fill{ height:100%; border-radius:999px; background-color:var(--fill,var(--state-ok)); box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 0 var(--fill-glow,0px) color-mix(in srgb,var(--fill,transparent) 60%,transparent); }
  .qw .progress-fill.session{ --fill:var(--state-ok); }
  .qw .progress-fill.weekly{ --fill:var(--weekly-ok); }
  .qw .progress-fill.warn{ --fill:var(--state-warn); --fill-glow:7px; }
  .qw .progress-fill.crit{ --fill:var(--state-crit); --fill-glow:9px; }
  .qw .usage-block.compact{ gap:5px; border-top:1px solid var(--line); padding-top:9px; }
  .qw .usage-block.compact .usage-name{ text-transform:none; font-size:11px; font-weight:500; letter-spacing:.01em; color:var(--body); }
  .qw .usage-pct{ font-size:12px; font-weight:600; color:var(--fg); font-variant-numeric:tabular-nums; letter-spacing:.01em; flex:none; white-space:nowrap; }
  .qw .usage-foot{ display:flex; align-items:baseline; justify-content:space-between; font-size:9.5px; color:var(--faint); }
  .qw .context-line{ display:flex; align-items:center; gap:7px; border-top:1px solid var(--line); padding-top:9px; font-size:11px; }
  .qw .context-label{ color:var(--body); white-space:nowrap; }
  .qw .context-pct{ margin-left:auto; font-weight:600; font-variant-numeric:tabular-nums; color:var(--fg); }
  .qw .freshness{ font-size:9px; color:var(--faint); text-align:right; margin-top:auto; letter-spacing:.02em; padding-right:3px; }
  /* faux editor code lines */
  .code-line{ height:7px; border-radius:3px; }
</style>
</helmet>

  <!-- floating Quotal widget, always-on-top, scaled up -->

          <button class="icon-btn"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg></button>

</div>
